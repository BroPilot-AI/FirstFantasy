<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTaco RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Scenes will be injected here -->
        <div id="scene-container"></div>
        <div id="ui-layer">
            <div id="overlay" class="overlay-message">

                <p id="overlay-text">Text here</p>
                <button id="overlay-btn" class="cyber-btn">Continue</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
